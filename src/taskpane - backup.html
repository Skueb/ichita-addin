<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Word Formatter</title>
    
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
    
    <style>
        /* กำหนดชุดสีที่รับบรีฟมา */
        :root {
            --bg-dark: #171C21;
            --text-light: #CFD9DB;
            --accent-blue: #82B0FF;
            --card-bg: rgba(207, 217, 219, 0.05); /* สีเทาอ่อนแบบโปร่งแสง */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        /* ส่วนหัวและโลโก้ */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 80px; /* ปรับขนาดโลโก้ได้ที่นี่ */
            height: auto;
            margin-bottom: 10px;
            /* เพิ่มลูกเล่นเรืองแสงนิดๆ ให้เข้ากับสีฟ้า */
            filter: drop-shadow(0 0 8px rgba(130, 176, 255, 0.3)); 
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: 1px;
        }

        /* กล่องเนื้อหาหลัก */
        .card {
            background-color: var(--card-bg);
            border: 1px solid rgba(207, 217, 219, 0.2);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        /* ซ่อนปุ่มเลือกไฟล์แบบเดิมที่ดูไม่สวย */
        .hidden-input {
            display: none;
        }

        /* ออกแบบปุ่มเลือกไฟล์ใหม่ */
        .file-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border: 2px dashed var(--accent-blue);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            color: var(--accent-blue);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .file-upload-label:hover {
            background-color: rgba(130, 176, 255, 0.1);
        }

        /* ปุ่มกดดำเนินการ */
        .primary-btn {
            background-color: var(--accent-blue);
            color: var(--bg-dark);
            border: none;
            padding: 14px 20px;
            width: 100%;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.3s ease;
            box-shadow: 0 4px 12px rgba(130, 176, 255, 0.2);
        }

        .primary-btn:hover {
            background-color: #9cbfff; /* สีฟ้าสว่างขึ้นนิดนึงตอนเอาเมาส์ชี้ */
            transform: translateY(-2px);
        }

        .primary-btn:active {
            transform: translateY(0);
        }

        /* กล่องแสดงสถานะการทำงาน */
        .status-container {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(207, 217, 219, 0.1);
            text-align: center;
            font-size: 0.9rem;
            min-height: 24px;
        }

        #status {
            margin: 0;
            word-wrap: break-word;
            color: var(--text-light); /* ให้สถานะเริ่มต้นเป็นสีเทาอ่อน */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="logo.png" alt="App Logo" class="logo">
            <h1>ICHITA Auto Template Generator</h1>
        </div>
        
        <div class="card">
            <label for="templateFile" class="file-upload-label">
                <span id="fileNameDisplay">📂 คลิกเพื่อเลือกไฟล์ Template</span>
            </label>
            <input type="file" id="templateFile" accept=".docx" class="hidden-input" />
            
            <button id="run-plugin" class="primary-btn">✨ จัดรูปแบบเอกสาร</button>
        </div>

        <div class="status-container">
            <p id="status">พร้อมใช้งาน</p>
        </div>
    </div>

    <script type="text/javascript" src="taskpane.js"></script>

    <script>
        document.getElementById('templateFile').addEventListener('change', function(e) {
            const fileNameDisplay = document.getElementById('fileNameDisplay');
            if (e.target.files.length > 0) {
                fileNameDisplay.innerHTML = "📄 " + e.target.files[0].name;
                fileNameDisplay.style.color = "#CFD9DB"; 
            } else {
                fileNameDisplay.innerHTML = "📂 คลิกเพื่อเลือกไฟล์ Template";
                fileNameDisplay.style.color = "var(--accent-blue)";
            }
        });
    </script>
</body>
</html>
